# ============================================
# DOCKER-COMPOSE.YML — SembakoKita.Pro
# ============================================
# Tugas:
# 1. Jalankan Postgres + pgvector (Supabase Hybrid)
# 2. Jalankan NestJS Backend AI Engine
# 3. Jalankan Adminer (Database UI)
# 4. Volume persistence untuk data
# ============================================

version: '3.8'

services:
  # ============================================
  # POSTGRES + PGVECTOR (Supabase Hybrid)
  # ============================================
  postgres:
    image: supabase/postgres:15.1.0.151
    container_name: sembako-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sembako}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sembako123}
      POSTGRES_DB: ${POSTGRES_DB:-sembakokita}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_CONFIG: |
        max_connections = 200
        shared_buffers = 256MB
        effective_cache_size = 768MB
        maintenance_work_mem = 64MB
        checkpoint_completion_target = 0.9
        wal_buffers = 16MB
        default_statistics_target = 100
        random_page_cost = 1.1
        effective_io_concurrency = 200
        work_mem = 4MB
        min_wal_size = 1GB
        max_wal_size = 4GB
        max_worker_processes = 4
        max_parallel_workers_per_gather = 2
        max_parallel_workers = 4
        max_parallel_maintenance_workers = 2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - sembako-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sembako} -d ${POSTGRES_DB:-sembakokita}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND AI ENGINE (NestJS)
  # ============================================
  backend:
    build:
      context: ../backend-hub
      dockerfile: Dockerfile
    container_name: sembako-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sembako}:${POSTGRES_PASSWORD:-sembako123}@postgres:5432/${POSTGRES_DB:-sembakokita}
      SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
      AI_API_KEY: ${AI_API_KEY:-your-ai-api-key}
      JWT_SECRET: ${JWT_SECRET:-sembako-jwt-secret}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    networks:
      - sembako-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # REDIS (Cache & Session)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: sembako-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sembako-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ADMINER (Database UI)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: sembako-adminer
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB: ${POSTGRES_DB:-sembakokita}
      ADMINER_DEFAULT_USER: ${POSTGRES_USER:-sembako}
      ADMINER_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-sembako123}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sembako-network

  # ============================================
  # PGVECTOR (Vector Database untuk AI)
  # ============================================
  pgvector:
    image: pgvector/pgvector:pg15
    container_name: sembako-pgvector
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sembako}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sembako123}
      POSTGRES_DB: ${POSTGRES_DB:-sembakokita_vector}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - sembako-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sembako} -d ${POSTGRES_DB:-sembakokita_vector}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # NGINX (Reverse Proxy & Static Files)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: sembako-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../web-pwa/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - sembako-network

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  pgvector_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  sembako-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
