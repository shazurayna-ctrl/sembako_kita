<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#065f46"/>
  
  <!-- SK Logo -->
  <text x="256" y="240" font-family="Arial, sans-serif" font-size="200" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central">SK</text>
  
  <!-- Subtitle -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="40" font-weight="600" fill="#f59e0b" text-anchor="middle" dominant-baseline="central">SembakoKita</text>
  
  <!-- Decorative Line -->
  <line x1="120" y1="370" x2="392" y2="370" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Small dots decoration -->
  <circle cx="100" cy="100" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="412" cy="100" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="100" cy="412" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="412" cy="412" r="8" fill="#f59e0b" opacity="0.3"/>
</svg>
