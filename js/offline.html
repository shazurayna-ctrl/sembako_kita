<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — SembakoKita.Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0fdf4;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .offline-container {
      text-align: center;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .offline-icon {
      font-size: 72px;
      margin-bottom: 20px;
    }
    h1 {
      color: #065f46;
      margin-bottom: 12px;
    }
    p {
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #065f46;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover {
      background: #064e3b;
    }
    .features {
      text-align: left;
      margin: 20px 0;
      padding: 12px 16px;
      background: #f0fdf4;
      border-radius: 8px;
    }
    .features li {
      list-style: none;
      padding: 4px 0;
      font-size: 13px;
      color: #1e293b;
    }
    .features li::before {
      content: '✅ ';
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Offline Mode</h1>
    <p>
      SembakoKita.Pro sedang offline.<br>
      Data tetap tersedia di perangkat Anda.
    </p>
    <div class="features">
      <li>Data lokal tetap tersimpan</li>
      <li>Transaksi dicatat untuk sinkronisasi nanti</li>
      <li>Stok & laporan tetap bisa diakses</li>
    </div>
    <button class="btn" onclick="location.reload()">🔄 Coba Lagi</button>
    <br><br>
    <a href="/" style="color:#065f46;text-decoration:none;font-size:13px;">← Kembali ke Aplikasi</a>
  </div>
</body>
</html>
